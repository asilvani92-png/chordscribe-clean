[phases.setup]
nixPkgs = ["ffmpeg", "python311", "gcc", "python311Packages.pip", "python311Packages.setuptools", "python311Packages.wheel"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip setuptools wheel && python3 -m pip install -r backend/requirements.txt"]

[start]
cmd = "python3 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
